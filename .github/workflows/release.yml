name: Release

# Cut a release when a version tag is pushed. Tags drive everything — the
# maintainer decides when v0.1.0 (or any later tag) ships; this workflow just
# turns that tag into cross-platform binaries and a GitHub Release.
on:
  push:
    tags:
      - "v*"

permissions:
  # GoReleaser needs write access to create the release and upload artifacts.
  contents: write

jobs:
  goreleaser:
    name: goreleaser
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history + tags so GoReleaser can build the changelog and
          # resolve the version correctly.
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          # Pinned to the v2.5 line so the runtime schema matches the
          # .goreleaser.yaml in this repo (validated locally with the same
          # series via `goreleaser check`). Bump deliberately alongside any
          # config-schema changes.
          version: "~> v2.5"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
